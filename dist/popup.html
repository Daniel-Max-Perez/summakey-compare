<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #000000;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --brand-primary: #4734ff;
      --brand-accent: #05FF66;
      --text-main: #FFFFFF;
      --text-dim: #A0A0A0;
      --gradient-purple: linear-gradient(135deg, #4734ff 0%, #8b5cf6 100%);
      --gradient-green: linear-gradient(135deg, #05FF66 0%, #00f2fe 100%);
    }

    body {
      width: 320px;
      font-family: 'Outfit', -apple-system, sans-serif;
      margin: 0;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at top left, rgba(71, 52, 255, 0.15), transparent 150px),
        radial-gradient(circle at bottom right, rgba(5, 255, 102, 0.05), transparent 150px);
      color: var(--text-main);
      padding: 20px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    
    .header-logo {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    h2 {
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin: 0;
    }

    #stat-box {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      transition: transform 0.3s ease;
    }

    #stat-box:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.3);
    }

    #product-count {
      font-size: 56px;
      font-weight: 700;
      background: var(--gradient-purple);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 4px;
    }

    #product-count span {
      font-size: 20px;
      font-weight: 300;
      color: var(--text-dim);
      -webkit-text-fill-color: var(--text-dim);
    }

    .count-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    #auth-banner {
      background: rgba(5, 255, 102, 0.05);
      border: 1px solid rgba(5, 255, 102, 0.2);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
    }

    #auth-banner p {
      margin: 0;
      font-size: 12px;
      color: #ccc;
    }

    #auth-banner a {
      color: var(--brand-accent);
      text-decoration: none;
      font-weight: 600;
    }

    .action-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button {
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .button::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .button:hover::after {
      opacity: 1;
    }

    .button:active {
      transform: scale(0.98);
    }

    .button.primary.green {
      background: var(--gradient-green);
      color: #000;
      box-shadow: 0 4px 15px rgba(5, 255, 102, 0.3);
    }

    .button.primary.purple {
      background: var(--gradient-purple);
      color: white;
      box-shadow: 0 4px 15px rgba(71, 52, 255, 0.3);
    }

    .tertiary-buttons {
      display: flex;
      gap: 10px;
    }

    .button.tertiary {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-dim);
      font-size: 13px;
      padding: 10px;
    }

    .button.tertiary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .footer {
      margin-top: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--glass-border);
      text-align: center;
    }

    #open-options {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    #open-options:hover {
      color: var(--brand-accent);
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .button.loading .loading-spinner {
      display: block;
    }

    .button.loading .btn-text {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <img src="icons/icon48.png" alt="Logo" class="header-logo">
      <h2>SummaKey Compare</h2>
    </header>

    <div id="stat-box">
      <div id="product-count">...</div>
      <div class="count-label">Pages in comparison list</div>
    </div>

    <div id="auth-banner" style="display: none;">
      <p>
        <a href="#" id="popup-sign-in-link">Sign in</a> to increase your limit to 10
      </p>
    </div>

    <div class="action-group">
      <button id="add-button" class="button primary green">
        <div class="loading-spinner"></div>
        <span class="btn-text">Add Current Page</span>
      </button>
      <button id="compare-button" class="button primary purple">
        <div class="loading-spinner"></div>
        <span class="btn-text">Compare Now</span>
      </button>
    </div>

    <div class="tertiary-buttons">
      <button id="clear-last-button" class="button tertiary">Undo Last</button>
      <button id="clear-all-button" class="button tertiary">Clear List</button>
    </div>

    <div class="footer">
      <a href="#" id="open-options">Settings & Upgrade ⚙️</a>
    </div>
  </div>

  <script src="supabase-bundle.js"></script>
  <script src="supabase.js"></script>
  <script src="popup.js"></script>
</body>

</html>
